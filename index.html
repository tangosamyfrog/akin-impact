<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AKIN Impact — Outcomes, not intentions</title>
  <link rel="stylesheet" href="assets/colors_and_type.css">
  <style>
    /* ============================================================
       AKIN.IMPACT — page-level styles
       Theme: peach paper duotone (Impact division)
       ============================================================ */
    :root {
      --canvas: #FFF4EE;
      --paper: #FFFFFF;
      --paper-warm: #F8E9DD;
      --ink: #3D1A0F;
      --ink-2: rgba(61,26,15,0.72);
      --ink-3: rgba(61,26,15,0.50);
      --ink-4: rgba(61,26,15,0.28);
      --rule: rgba(61,26,15,0.14);
      --rule-2: rgba(61,26,15,0.08);
      --peach-50: #FFF4EE;
      --peach-100: #FFE9DD;
      --peach-200: #FFD9C8;
      --peach-300: #FFC4AC;
      --peach-500: #FF8A6B;
      --peach-600: #E5694A;
      --peach-700: #C25B3F;
      --slate: #5B7B9A;
      --slate-300: #94B3CC;
      --slate-700: #3F5972;
      --slate-deep: #2C3E50;
    }
    html, body { background: var(--canvas); color: var(--ink); }
    body { font-family: 'Inter', system-ui, sans-serif; }
    * { box-sizing: border-box; }

    /* alt paper variants */
    body[data-paper="warmer"] { --canvas: #FBE4D2; --paper: #FFF7EE; }
    body[data-paper="darker"] { --canvas: #F2D8C5; --paper: #FFF1E4; }

    .page { max-width: 1440px; margin: 0 auto; padding: 0 48px; }
    @media (max-width: 900px) { .page { padding: 0 24px; } }

    /* ── NAV ───────────────────────────────────── */
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 22px 0; position: sticky; top: 0; z-index: 50;
      background: color-mix(in srgb, var(--canvas) 86%, transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule-2);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--ink); color: var(--peach-100);
      display: grid; place-items: center;
      font: 700 14px/1 'Space Grotesk', sans-serif;
    }
    .brand-name { font: 600 16px/1 'Space Grotesk', sans-serif; letter-spacing: -0.01em; }
    .brand-tag {
      padding: 4px 8px; border-radius: 4px; background: var(--peach-500); color: var(--ink);
      font: 600 10px/1 'Space Grotesk', sans-serif; letter-spacing: 0.14em; text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links button {
      background: none; border: 0; padding: 0; cursor: pointer; color: var(--ink);
      font: 500 14px/1 'Inter', sans-serif;
    }
    .nav-links button.active { color: var(--peach-700); font-weight: 600; }
    .btn-primary {
      padding: 10px 18px; border-radius: 6px; background: var(--peach-700); color: #FFE9DD;
      border: 0; cursor: pointer; font: 600 13px/1 'Inter', sans-serif;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background var(--dur-base) var(--ease-out);
    }
    .btn-primary:hover { background: var(--ink); }
    .btn-ghost {
      padding: 10px 18px; border-radius: 6px; background: transparent; color: var(--slate-deep);
      border: 1px solid var(--slate); cursor: pointer; font: 600 13px/1 'Inter', sans-serif;
      display: inline-flex; align-items: center; gap: 8px;
      transition: all var(--dur-base) var(--ease-out);
    }
    .btn-ghost:hover { background: var(--slate); color: #fff; }
    .btn-ink {
      padding: 14px 24px; border-radius: 6px; background: var(--ink); color: var(--peach-100);
      border: 0; cursor: pointer; font: 600 14px/1 'Inter', sans-serif;
      display: inline-flex; align-items: center; gap: 8px;
      transition: background var(--dur-base) var(--ease-out);
    }
    .btn-ink:hover { background: #1d0c08; }

    /* ── EYEBROW ───────────────────────────────────── */
    .eyebrow {
      font: 500 11px/1 'Inter'; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--slate);
      display: inline-flex; align-items: center; gap: 8px;
    }
    .eyebrow .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--peach-500);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .eyebrow.alt .dot { background: var(--slate); }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,138,107,0.45); }
      50%     { box-shadow: 0 0 0 6px rgba(255,138,107,0); }
    }

    /* ── HERO ───────────────────────────────────── */
    .hero { padding: 56px 0 80px; display: grid; grid-template-columns: 1.35fr 1fr; gap: 56px; align-items: start; }
    .hero h1 {
      font: 600 96px/0.96 'Space Grotesk'; letter-spacing: -0.025em;
      margin-top: 24px;
    }
    .hero h1 .underline { border-bottom: 6px solid var(--peach-500); padding-bottom: 2px; }
    .hero h1 .ink-soft { color: var(--ink-2); }
    .hero-sub {
      margin-top: 28px; max-width: 540px;
      font: 400 18px/1.55 'Inter'; color: var(--ink-2);
    }
    .hero-ctas { margin-top: 32px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    .hero-stats { margin-top: 40px; display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .stat-card {
      padding: 18px; background: var(--paper); border: 1px solid var(--peach-200); border-radius: 12px;
    }
    .stat-card .num { font: 600 32px/1 'Space Grotesk'; letter-spacing: -0.02em; }
    .stat-card .num.peach { color: var(--peach-700); }
    .stat-card .num.slate { color: var(--slate); }
    .stat-card .num.ink { color: var(--ink); }
    .stat-card .lbl { margin-top: 6px; font: 400 12px/1.3 'Inter'; color: var(--ink-3); }

    /* ── HERO LIVE PANEL ───────────────────────────────────── */
    .live-panel {
      padding: 28px; background: var(--peach-500); color: var(--ink); border-radius: 16px;
      box-shadow: 0 24px 80px rgba(255,138,107,0.30);
    }
    .live-panel-eyebrow { font: 500 11px/1 'Inter'; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink); opacity: 0.7; }
    .live-big { margin-top: 18px; font: 600 88px/0.95 'Space Grotesk'; letter-spacing: -0.03em; }
    .live-sub { margin-top: 6px; font: 500 14px/1.35 'Inter'; }
    .live-chart-wrap {
      margin-top: 20px; padding: 16px; border-radius: 10px;
      background: rgba(255,255,255,0.20);
    }
    .live-chart-legend { display: flex; justify-content: space-between; font: 500 11px/1 'Inter'; margin-bottom: 10px; }
    .live-chart-legend .l { opacity: 0.75; }
    .live-x-axis { margin-top: 12px; display: flex; justify-content: space-between; font: 500 10px/1 'JetBrains Mono'; opacity: 0.7; }

    /* ── SECTION HELPERS ───────────────────────────────────── */
    section { padding: 88px 0; border-top: 1px solid var(--rule); position: relative; }
    .section-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: 40px; gap: 32px; flex-wrap: wrap; }
    .section-title { font: 600 56px/1.02 'Space Grotesk'; letter-spacing: -0.025em; max-width: 760px; }
    .section-title .accent { color: var(--peach-700); }
    .section-num { font: 500 14px/1 'JetBrains Mono'; color: var(--slate); }
    .section-aside { font: 400 15px/1.55 'Inter'; color: var(--ink-2); max-width: 360px; }

    /* ── DASHBOARD ───────────────────────────────────── */
    .dash-grid {
      display: grid; grid-template-columns: 1.35fr 1fr; gap: 16px;
    }
    .dash-card {
      background: var(--paper); border-radius: 16px; border: 1px solid var(--peach-200);
      padding: 24px; position: relative;
    }
    .dash-card.dark { background: var(--ink); color: var(--peach-100); border-color: var(--ink); }
    .dash-card.peach { background: var(--peach-500); color: var(--ink); border-color: var(--peach-500); }
    .dash-card.slate { background: var(--slate-deep); color: var(--peach-100); border-color: var(--slate-deep); }

    .dash-card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .dash-card-title { font: 600 14px/1 'Inter'; }
    .dash-card-meta { font: 500 11px/1 'JetBrains Mono'; opacity: 0.6; }
    .dash-card.dark .dash-card-meta, .dash-card.peach .dash-card-meta, .dash-card.slate .dash-card-meta { opacity: 0.7; }

    /* dashboard sub-grid */
    .dash-row { display: grid; gap: 16px; margin-top: 16px; }
    .dash-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .dash-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .dash-row.split-1-2 { grid-template-columns: 1fr 2fr; }

    .kpi { padding: 22px 24px; }
    .kpi .label { font: 500 11px/1 'Inter'; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
    .kpi .value { margin-top: 14px; font: 600 56px/0.96 'Space Grotesk'; letter-spacing: -0.025em; }
    .kpi .delta { margin-top: 8px; font: 500 12px/1 'Inter'; color: var(--slate); display: inline-flex; align-items: center; gap: 6px; }
    .kpi .delta.up::before { content: "▲"; color: #2EBF89; font-size: 10px; }
    .kpi .delta.flat::before { content: "—"; color: var(--ink-3); }

    .dash-card.dark .kpi .label,
    .dash-card.slate .kpi .label { color: rgba(231,230,228,0.6); }
    .dash-card.peach .kpi .label { color: rgba(61,26,15,0.65); }

    /* SDG progress */
    .sdg-list { display: grid; gap: 14px; }
    .sdg-row { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; }
    .sdg-num {
      width: 32px; height: 32px; border-radius: 6px; display: grid; place-items: center;
      font: 600 12px/1 'Space Grotesk'; color: #fff;
    }
    .sdg-row .label { font: 500 13px/1.2 'Inter'; }
    .sdg-row .pct { font: 500 12px/1 'JetBrains Mono'; color: var(--ink-3); }
    .sdg-bar { height: 6px; background: var(--peach-100); border-radius: 999px; overflow: hidden; }
    .sdg-bar > i { display: block; height: 100%; background: var(--peach-600); border-radius: 999px; }

    /* hours pledged */
    .donut-wrap { display: flex; align-items: center; gap: 24px; }
    .donut { width: 132px; height: 132px; flex-shrink: 0; }
    .donut-legend { display: grid; gap: 10px; flex: 1; }
    .donut-legend .li { display: grid; grid-template-columns: 12px 1fr auto; gap: 10px; align-items: center; font: 500 13px/1.2 'Inter'; }
    .donut-legend .sw { width: 12px; height: 12px; border-radius: 3px; }
    .donut-legend .v { font: 500 12px/1 'JetBrains Mono'; color: var(--peach-100); opacity: 0.7; }

    /* reach over time */
    .map-card { padding: 0; overflow: hidden; }
    .map-head { padding: 24px 24px 16px; }
    .reach-bars { padding: 0 24px 24px; display: grid; gap: 12px; }
    .reach-row { display: grid; grid-template-columns: 90px 1fr 60px; gap: 12px; align-items: center; }
    .reach-row .country { font: 500 13px/1 'Inter'; }
    .reach-row .bar { height: 14px; background: var(--peach-100); border-radius: 4px; overflow: hidden; position: relative; }
    .reach-row .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--peach-500), var(--peach-700)); border-radius: 4px; transition: width var(--dur-slow) var(--ease-out); }
    .reach-row .v { font: 500 12px/1 'JetBrains Mono'; color: var(--ink-3); text-align: right; }

    /* ── INITIATIVES ───────────────────────────────────── */
    .init-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .init-card {
      background: var(--paper); border: 1px solid var(--peach-200); border-radius: 16px;
      padding: 28px; display: grid; gap: 16px;
      position: relative; overflow: hidden;
      transition: all var(--dur-base) var(--ease-out);
      cursor: pointer;
    }
    .init-card:hover { transform: translateY(-2px); box-shadow: 0 16px 48px rgba(61,26,15,0.10); border-color: var(--peach-500); }
    .init-card.featured { background: var(--ink); color: var(--peach-100); border-color: var(--ink); }
    .init-card.featured .meta-row { color: rgba(231,230,228,0.7); }
    .init-card.featured h3 { color: var(--peach-100); }
    .init-card.featured .desc { color: rgba(231,230,228,0.75); }
    .init-card.featured .pill.live { background: var(--peach-500); color: var(--ink); }

    .init-card .meta-row {
      display: flex; gap: 12px; align-items: center; font: 500 11px/1 'JetBrains Mono';
      color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase;
    }
    .pill {
      padding: 4px 10px; border-radius: 999px; font: 600 10px/1 'Inter';
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .pill.live { background: var(--peach-500); color: var(--ink); }
    .pill.live::before { content: "● "; }
    .pill.upcoming { background: var(--slate); color: #fff; }
    .pill.recurring { background: var(--peach-100); color: var(--peach-700); }
    .pill.tag { background: var(--paper-warm); color: var(--ink-2); }

    .init-card h3 { font: 600 28px/1.1 'Space Grotesk'; letter-spacing: -0.015em; }
    .init-card .desc { font: 400 15px/1.5 'Inter'; color: var(--ink-2); }
    .init-card .progress {
      height: 8px; background: var(--peach-100); border-radius: 999px; overflow: hidden;
    }
    .init-card.featured .progress { background: rgba(231,230,228,0.15); }
    .init-card .progress > i { display: block; height: 100%; background: var(--peach-600); border-radius: 999px; }
    .init-card.featured .progress > i { background: var(--peach-500); }
    .init-card .progress-row { display: flex; justify-content: space-between; font: 500 12px/1 'JetBrains Mono'; }
    .init-card .cta-row { display: flex; justify-content: space-between; align-items: center; padding-top: 4px; border-top: 1px solid var(--rule-2); margin-top: 4px; }
    .init-card.featured .cta-row { border-top-color: rgba(231,230,228,0.15); }
    .init-card .cta-link {
      font: 600 13px/1 'Inter'; color: var(--peach-700); text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .init-card.featured .cta-link { color: var(--peach-300); }

    /* ── ENGAGE — 4 ways ───────────────────────────────────── */
    .engage-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; border: 1px solid var(--rule); border-radius: 16px; overflow: hidden; background: var(--paper); }
    .engage-cell { padding: 28px; display: grid; gap: 14px; border-right: 1px solid var(--rule-2); transition: background var(--dur-base) var(--ease-out); cursor: pointer; }
    .engage-cell:last-child { border-right: 0; }
    .engage-cell:hover { background: var(--peach-50); }
    .engage-cell .num { font: 500 12px/1 'JetBrains Mono'; color: var(--peach-700); letter-spacing: 0.1em; }
    .engage-cell h4 { font: 600 22px/1.1 'Space Grotesk'; letter-spacing: -0.01em; }
    .engage-cell p { font: 400 14px/1.5 'Inter'; color: var(--ink-2); }
    .engage-cell .arrow { font: 400 18px/1 'Inter'; color: var(--peach-700); transition: transform var(--dur-base) var(--ease-out); align-self: end; }
    .engage-cell:hover .arrow { transform: translateX(4px); }

    /* ── PROJECTS / CASE STUDIES ───────────────────────────────────── */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-chip {
      padding: 8px 14px; border-radius: 999px; background: transparent;
      border: 1px solid var(--rule); color: var(--ink-2); cursor: pointer;
      font: 500 13px/1 'Inter'; transition: all var(--dur-base) var(--ease-out);
    }
    .filter-chip:hover { border-color: var(--peach-500); color: var(--ink); }
    .filter-chip.active { background: var(--ink); color: var(--peach-100); border-color: var(--ink); }

    .project-list { display: grid; gap: 0; border-top: 1px solid var(--rule); }
    .project-row {
      display: grid; grid-template-columns: 60px 1.6fr 1fr 1fr 100px 24px;
      gap: 24px; padding: 24px 0; border-bottom: 1px solid var(--rule-2);
      align-items: center; cursor: pointer; transition: all var(--dur-base) var(--ease-out);
    }
    .project-row:hover { padding-left: 12px; padding-right: 12px; background: var(--peach-50); border-radius: 8px; }
    .project-row .idx { font: 500 13px/1 'JetBrains Mono'; color: var(--ink-3); }
    .project-row .title { font: 600 22px/1.2 'Space Grotesk'; letter-spacing: -0.015em; }
    .project-row .partner { font: 400 13px/1.4 'Inter'; color: var(--ink-2); }
    .project-row .year { font: 500 13px/1 'JetBrains Mono'; color: var(--slate); }
    .project-row .outcome { font: 500 13px/1.3 'Inter'; color: var(--ink); }
    .project-row .outcome .num { font: 600 18px/1 'Space Grotesk'; color: var(--peach-700); display: block; }
    .project-row .arrow { font: 400 18px/1 'Inter'; color: var(--peach-700); transition: transform var(--dur-base) var(--ease-out); }
    .project-row:hover .arrow { transform: translate(4px, -4px); }

    .project-row .tag-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .project-row .tag {
      padding: 3px 8px; border-radius: 999px; background: var(--peach-100);
      color: var(--peach-700); font: 500 10px/1 'Inter'; letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* ── CAUSES ───────────────────────────────────── */
    .causes-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    .cause-card {
      padding: 24px; border-radius: 12px; background: var(--paper-warm);
      border: 1px solid var(--peach-200);
      display: grid; gap: 12px; min-height: 220px;
      transition: all var(--dur-base) var(--ease-out);
      cursor: pointer;
    }
    .cause-card:hover { background: var(--peach-200); }
    .cause-card .glyph { font: 600 28px/1 'Space Grotesk'; color: var(--peach-700); letter-spacing: -0.02em; }
    .cause-card h4 { font: 600 22px/1.1 'Space Grotesk'; letter-spacing: -0.01em; }
    .cause-card p { font: 400 13px/1.5 'Inter'; color: var(--ink-2); margin-top: auto; }
    .cause-card .meta { font: 500 11px/1 'JetBrains Mono'; color: var(--slate); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── PARTNERS ───────────────────────────────────── */
    .partners-grid {
      display: grid; grid-template-columns: repeat(6,1fr); gap: 1px;
      background: var(--rule); border: 1px solid var(--rule); border-radius: 12px; overflow: hidden;
    }
    .partner-cell {
      padding: 28px; background: var(--paper); display: grid; place-items: center;
      font: 600 18px/1.2 'Space Grotesk'; letter-spacing: -0.01em; text-align: center;
      min-height: 100px; color: var(--ink); transition: all var(--dur-base) var(--ease-out);
    }
    .partner-cell:hover { background: var(--peach-50); color: var(--peach-700); }

    /* ── HONEST LEARNINGS ───────────────────────────────────── */
    .learnings {
      background: var(--ink); color: var(--peach-100); padding: 56px; border-radius: 16px;
      display: grid; grid-template-columns: 1fr 1.4fr; gap: 56px;
    }
    .learnings .head .eyebrow { color: var(--peach-300); }
    .learnings .head .eyebrow .dot { background: var(--peach-500); }
    .learnings h2 { font: 600 48px/1.05 'Space Grotesk'; letter-spacing: -0.02em; margin-top: 16px; max-width: 360px; }
    .learnings .head p { margin-top: 20px; font: 400 15px/1.55 'Inter'; color: rgba(231,230,228,0.7); max-width: 420px; }
    .learnings-list { display: grid; gap: 0; border-top: 1px solid rgba(231,230,228,0.15); }
    .learning-row {
      padding: 20px 0; border-bottom: 1px solid rgba(231,230,228,0.10);
      display: grid; grid-template-columns: 56px 1fr; gap: 16px; align-items: start;
    }
    .learning-row .num { font: 500 13px/1 'JetBrains Mono'; color: var(--peach-500); padding-top: 4px; }
    .learning-row h5 { font: 600 18px/1.25 'Space Grotesk'; letter-spacing: -0.01em; color: var(--peach-100); }
    .learning-row p { margin-top: 8px; font: 400 14px/1.55 'Inter'; color: rgba(231,230,228,0.65); }
    .learning-row .verdict {
      display: inline-block; margin-top: 10px;
      padding: 3px 10px; border-radius: 999px;
      background: rgba(231,230,228,0.10); color: var(--peach-300);
      font: 500 11px/1 'JetBrains Mono'; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ── QUOTE ───────────────────────────────────── */
    .quote {
      padding: 96px 0; display: grid; grid-template-columns: 80px 1fr 380px; gap: 40px; align-items: start;
    }
    .quote .glyph { font: 700 96px/0.7 'Space Grotesk'; color: var(--peach-500); }
    .quote .body { font: 500 36px/1.25 'Space Grotesk'; letter-spacing: -0.015em; color: var(--ink); max-width: 760px; }
    .quote .attribution { font: 400 14px/1.4 'Inter'; color: var(--ink-2); }
    .quote .attribution .name { font-weight: 600; color: var(--ink); display: block; }

    /* ── FOOTER / CTA ───────────────────────────────────── */
    .cta-band {
      background: var(--peach-500); color: var(--ink); padding: 80px 0; margin: 0 -48px;
      padding-left: 48px; padding-right: 48px;
    }
    .cta-band .inner { max-width: 1440px; margin: 0 auto; display: grid; grid-template-columns: 1.6fr 1fr; gap: 48px; align-items: end; }
    .cta-band h2 { font: 600 88px/0.98 'Space Grotesk'; letter-spacing: -0.025em; max-width: 760px; }
    .cta-band p { margin-top: 20px; font: 400 17px/1.5 'Inter'; max-width: 480px; opacity: 0.85; }
    .cta-band .right { display: grid; gap: 12px; align-self: center; }
    .cta-band .right .btn-ink { background: var(--ink); color: var(--peach-100); justify-content: center; padding: 18px 28px; font-size: 15px; }
    .cta-band .right .btn-paper { background: var(--peach-100); color: var(--ink); justify-content: center; padding: 18px 28px; font: 600 15px/1 'Inter'; border: 0; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }

    .footer {
      padding: 56px 0 40px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px;
      border-top: 1px solid var(--rule);
    }
    .footer h6 { font: 500 11px/1 'Inter'; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 16px; }
    .footer ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
    .footer a { color: var(--ink); text-decoration: none; font: 400 14px/1.4 'Inter'; }
    .footer a:hover { color: var(--peach-700); }
    .footer-bottom { padding: 24px 0; display: flex; justify-content: space-between; font: 500 11px/1 'JetBrains Mono'; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); border-top: 1px solid var(--rule-2); }

    /* ── MODALS ───────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(61,26,15,0.55); backdrop-filter: blur(4px);
      z-index: 100; display: grid; place-items: center; padding: 24px;
      animation: fade-in 240ms var(--ease-out);
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--paper); border-radius: 18px; max-width: 640px; width: 100%;
      max-height: 90vh; overflow-y: auto; padding: 40px;
      animation: rise-in 320ms var(--ease-out);
      box-shadow: 0 32px 80px rgba(61,26,15,0.25);
    }
    @keyframes rise-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-close {
      position: absolute; top: 24px; right: 24px;
      width: 36px; height: 36px; border-radius: 50%; background: var(--peach-100); border: 0;
      cursor: pointer; font: 500 16px/1 'Inter'; color: var(--ink);
    }
    .modal h3 { font: 600 36px/1.05 'Space Grotesk'; letter-spacing: -0.02em; }
    .modal .step-bar { display: flex; gap: 6px; margin: 20px 0 28px; }
    .modal .step-bar > i { height: 4px; flex: 1; background: var(--peach-100); border-radius: 2px; }
    .modal .step-bar > i.done { background: var(--peach-700); }
    .modal label { display: block; font: 500 12px/1 'Inter'; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); margin: 18px 0 8px; }
    .modal input, .modal textarea, .modal select {
      width: 100%; padding: 14px 16px; border-radius: 8px; border: 1px solid var(--rule);
      background: var(--paper); color: var(--ink); font: 400 15px/1.4 'Inter';
      transition: border-color var(--dur-base) var(--ease-out);
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--peach-500); }
    .modal textarea { min-height: 120px; resize: vertical; font-family: 'Inter'; }
    .modal .radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .modal .radio-card {
      padding: 14px; border: 1px solid var(--rule); border-radius: 8px; cursor: pointer;
      font: 500 13px/1.3 'Inter'; transition: all var(--dur-base) var(--ease-out);
    }
    .modal .radio-card.selected { border-color: var(--peach-700); background: var(--peach-50); color: var(--peach-700); }
    .modal-actions { margin-top: 28px; display: flex; justify-content: space-between; align-items: center; }
    .modal .step-text { font: 500 12px/1 'JetBrains Mono'; color: var(--ink-3); letter-spacing: 0.1em; }
    .modal-success { text-align: center; padding: 40px 0; }
    .modal-success .check { width: 72px; height: 72px; margin: 0 auto 24px; border-radius: 50%; background: var(--peach-500); display: grid; place-items: center; font: 600 36px/1 'Space Grotesk'; color: var(--ink); }

    /* responsive */
    @media (max-width: 1100px) {
      .hero { grid-template-columns: 1fr; }
      .dash-grid { grid-template-columns: 1fr; }
      .init-grid { grid-template-columns: 1fr; }
      .engage-grid { grid-template-columns: 1fr 1fr; }
      .causes-grid { grid-template-columns: 1fr 1fr; }
      .partners-grid { grid-template-columns: repeat(3,1fr); }
      .learnings { grid-template-columns: 1fr; padding: 40px; }
      .quote { grid-template-columns: 1fr; }
      .quote .glyph { font-size: 72px; }
      .cta-band .inner { grid-template-columns: 1fr; }
      .footer { grid-template-columns: 1fr 1fr; gap: 32px; }
      .project-row { grid-template-columns: 40px 2fr 1fr 60px 24px; }
      .project-row .partner { display: none; }
      .hero h1 { font-size: 64px; }
      .section-title { font-size: 40px; }
      .cta-band h2 { font-size: 56px; }
    }
  </style>
